/* === สไตล์ === */
/* ============================================================================
   styles.css — ดีไซน์เชิงบรรณาธิการ/วิชาการ + accent ธีมอินเดีย
   ฟอนต์ฝัง base64 ถูกแทรกที่ส่วน @font-face ตอน build (ดู build.js / {{FONTS}})
   ============================================================================ */

/* ---------- ตัวแปรธีม ---------- */
:root {
  --paper:      #f4efe4;   /* พื้นกระดาษครีม */
  --paper-2:    #ece4d4;   /* ครีมเข้มขึ้น */
  --ink:        #1d2436;   /* หมึกน้ำเงินเข้ม */
  --ink-soft:   #4a5266;
  --ink-faint:  #8a8475;

  --saffron:    #d9772a;   /* เหลืองหญ้าฝรั่นแบบเข้มพอให้อ่านบนครีม */
  --saffron-br: #f08a2c;
  --green:      #1c7a45;   /* เขียวอินเดีย */
  --green-br:   #2e9d5e;
  --clay:       #b23a25;   /* แดงดิน = โทนเตือน */
  --navy:       #0e2f63;   /* น้ำเงินจักร */

  --line:       #d8cdb8;
  --card:       #fbf7ee;
  --shadow:     0 1px 2px rgba(29,36,54,.04), 0 14px 40px -18px rgba(29,36,54,.28);
  --shadow-lg:  0 30px 80px -30px rgba(29,36,54,.45);

  --serif: 'Noto Serif Thai', Georgia, serif;
  --sans:  'Noto Sans Thai', system-ui, -apple-system, sans-serif;

  --maxw: 1120px;
  --ease: cubic-bezier(.22,.61,.36,1);
  --ease-out: cubic-bezier(.16,1,.3,1);

  /* accent ต่อหมวด (override ด้วย [data-cat]) */
  --accent: var(--navy);
  --accent-soft: rgba(14,47,99,.10);
}

[data-cat="neutral"]  { --accent: var(--navy);    --accent-soft: rgba(14,47,99,.10); }
[data-cat="positive"] { --accent: var(--green);   --accent-soft: rgba(28,122,69,.12); }
[data-cat="warning"]  { --accent: var(--clay);    --accent-soft: rgba(178,58,37,.10); }
[data-cat="insight"]  { --accent: var(--saffron); --accent-soft: rgba(217,119,42,.13); }

/* ---------- รีเซ็ต ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.6;
  font-weight: 400;
  overflow-x: hidden;
  /* texture: เกรนละเอียดจาก SVG inline */
  background-image:
    radial-gradient(1200px 600px at 80% -10%, rgba(217,119,42,.07), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(28,122,69,.06), transparent 55%);
  background-attachment: fixed;
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  opacity: .5; mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.045'/></svg>");
}
::selection { background: var(--accent-soft); }

/* ---------- ปุ่มควบคุมมุมบน (toolbar) ---------- */
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 60;
  display: flex; align-items: center; gap: .6rem;
  padding: .85rem clamp(1rem, 3vw, 2rem);
  pointer-events: none;
}
.brand {
  pointer-events: auto;
  display: flex; align-items: center; gap: .6rem;
  font-weight: 700; letter-spacing: .01em; color: var(--ink);
  font-size: .95rem;
}
.brand .chakra-mini { width: 26px; height: 26px; flex: 0 0 auto; }
.brand small { display: block; font-weight: 400; color: var(--ink-soft); font-size: .72rem; letter-spacing: .04em; }
.toolbar .spacer { flex: 1; }

.btn {
  pointer-events: auto;
  font-family: var(--sans); font-size: .82rem; font-weight: 600;
  color: var(--ink); background: var(--card);
  border: 1px solid var(--line); border-radius: 999px;
  padding: .55rem .9rem; min-height: 42px;
  display: inline-flex; align-items: center; gap: .45rem;
  cursor: pointer; white-space: nowrap;
  transition: transform .18s var(--ease), background .18s, border-color .18s, color .18s, box-shadow .18s;
  box-shadow: var(--shadow);
}
.btn:hover { transform: translateY(-1px); border-color: var(--accent); }
.btn:active { transform: translateY(0) scale(.98); }
.btn:focus-visible { outline: 3px solid var(--accent-soft); outline-offset: 2px; }
.btn .ico { width: 17px; height: 17px; flex: 0 0 auto; }
.btn[aria-pressed="true"] { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.btn .kbd {
  font-size: .62rem; font-weight: 700; opacity: .55;
  border: 1px solid currentColor; border-radius: 4px; padding: 0 .28rem; line-height: 1.4;
}
@media (max-width: 720px) {
  .btn .lbl { display: none; }
  .btn .kbd { display: none; }
  .btn { padding: .55rem; min-width: 42px; justify-content: center; }
  .brand small { display: none; }
}

/* ---------- progress bar (scroll mode) ---------- */
.progress {
  position: fixed; top: 0; left: 0; height: 3px; width: 0%;
  background: linear-gradient(90deg, var(--saffron), var(--green));
  z-index: 70; transition: width .1s linear;
}
body.mode-slide .progress { opacity: 0; }

/* ---------- โครงสไลด์ ---------- */
.deck { position: relative; z-index: 1; }
.slide {
  position: relative;
  max-width: var(--maxw);
  margin: 0 auto;
  padding: clamp(3.5rem, 9vh, 7rem) clamp(1.25rem, 5vw, 3rem);
  min-height: 92vh;
  display: flex; flex-direction: column; justify-content: center;
}
.slide + .slide { border-top: 1px solid var(--line); }

.kicker {
  display: inline-flex; align-items: center; gap: .55rem;
  font-size: .78rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 1.1rem;
}
.kicker::before {
  content: ""; width: 26px; height: 2px; background: var(--accent); border-radius: 2px;
}
.cat-pill {
  font-size: .68rem; font-weight: 700; letter-spacing: .04em;
  padding: .2rem .6rem; border-radius: 999px;
  background: var(--accent-soft); color: var(--accent);
  text-transform: none; letter-spacing: .02em;
}

h1, h2 { font-family: var(--serif); font-weight: 900; line-height: 1.04; color: var(--ink); letter-spacing: -.01em; }
.slide h2 { font-size: clamp(2rem, 5.2vw, 3.4rem); margin-bottom: 1rem; }
.lead { font-size: clamp(1.05rem, 2.1vw, 1.35rem); color: var(--ink-soft); max-width: 46ch; margin-bottom: 2rem; }

/* ---------- HERO ---------- */
.hero { min-height: 100vh; }
.hero-grid {
  display: grid; grid-template-columns: 1.15fr .85fr; gap: clamp(2rem, 5vw, 4rem);
  align-items: center;
}
.hero h1 {
  font-size: clamp(3.2rem, 11vw, 7.5rem); line-height: .92; margin: .3rem 0 .2rem;
}
.hero .name-en {
  font-family: var(--sans); font-weight: 500; letter-spacing: .22em; text-transform: uppercase;
  color: var(--ink-faint); font-size: clamp(.8rem, 2vw, 1.05rem); margin-bottom: 1.6rem;
}
.hero .lead { font-size: clamp(1.1rem, 2.3vw, 1.45rem); max-width: 34ch; }
.hero-tags { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1.8rem; }
.hero-tags span {
  font-size: .8rem; font-weight: 600; color: var(--ink-soft);
  border: 1px solid var(--line); background: var(--card);
  padding: .4rem .8rem; border-radius: 999px;
}

/* กรอบพอร์เทรต (placeholder) */
.portrait {
  position: relative; aspect-ratio: 4/5; width: 100%;
  border-radius: 18px; overflow: hidden;
  background:
    linear-gradient(160deg, #fff7ec 0%, #f6ede0 55%, #eef0e6 100%);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-lg);
}
.portrait .flag-band { position: absolute; inset: 0; }
.portrait .silhouette { position: absolute; inset: 0; display: grid; place-items: center; }
.portrait .ph-note {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: .7rem .9rem; font-size: .72rem; color: var(--ink-soft);
  background: linear-gradient(transparent, rgba(255,255,255,.85) 40%);
  text-align: center;
}
.portrait .ph-note b { color: var(--accent); }

/* ภาพจริง */
.portrait.has-photo { margin: 0; background: linear-gradient(165deg, #ffffff 0%, #f6ede0 70%, #eef0e6 100%); }
.portrait-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: 50% 22%; display: block;
}
/* แถบไตรรงค์อินเดียบางๆ ด้านล่างเป็น accent อย่างมีรสนิยม */
.portrait.has-photo::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 5px; z-index: 2;
  background: linear-gradient(90deg, #FF9933 0 33.3%, #ffffff 33.3% 66.6%, #138808 66.6% 100%);
}
.portrait-credit {
  position: absolute; right: 8px; bottom: 12px; z-index: 3;
  font-size: .6rem; letter-spacing: .01em; color: var(--ink-soft);
  background: rgba(255,255,255,.78); backdrop-filter: blur(2px);
  padding: .18rem .45rem; border-radius: 5px; line-height: 1.3;
}

@media (max-width: 860px) {
  .hero-grid { grid-template-columns: 1fr; }
  .portrait { max-width: 320px; margin: 0 auto; order: -1; }
}

/* ---------- การ์ดข้อมูล (facts) ---------- */
.facts-row { display: flex; flex-wrap: wrap; gap: .8rem; margin-top: .5rem; }
.fact-mini {
  flex: 1 1 200px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 1.1rem 1.2rem; box-shadow: var(--shadow);
}
.fact-mini .k { font-size: .76rem; font-weight: 700; letter-spacing: .04em; color: var(--ink-faint); text-transform: uppercase; }
.fact-mini .v { font-size: 1.15rem; font-weight: 700; margin-top: .25rem; }

.profile-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 1rem; margin-top: .5rem;
}
.pcard {
  background: var(--card); border: 1px solid var(--line); border-radius: 16px;
  padding: 1.4rem; box-shadow: var(--shadow);
  display: flex; flex-direction: column; gap: .5rem;
}
.pcard .pico {
  width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center;
  background: var(--accent-soft); color: var(--accent); margin-bottom: .3rem;
}
.pcard .pico svg { width: 24px; height: 24px; }
.pcard .k { font-size: .76rem; font-weight: 700; letter-spacing: .05em; color: var(--ink-faint); text-transform: uppercase; }
.pcard .v { font-size: 1.3rem; font-weight: 700; font-family: var(--serif); }
.pcard .sub { font-size: .92rem; color: var(--ink-soft); }

/* ---------- TIMELINE (มินิไทม์ไลน์อินเทอแรกทีฟ) ---------- */
.timeline { position: relative; margin-top: 1rem; padding-left: 2.4rem; }
.timeline::before {
  content: ""; position: absolute; left: 11px; top: 6px; bottom: 6px; width: 2px;
  background: var(--line);
}
.timeline .rail-fill {
  position: absolute; left: 11px; top: 6px; width: 2px; height: 0;
  background: linear-gradient(var(--accent), var(--accent));
  transition: height 1.1s var(--ease); border-radius: 2px;
}
.tl-item { position: relative; padding: 0 0 1.7rem 0; }
.tl-item:last-child { padding-bottom: 0; }
.tl-item .dot {
  position: absolute; left: -2.4rem; top: 2px;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--paper); border: 2px solid var(--line);
  display: grid; place-items: center;
  transition: border-color .4s var(--ease), background .4s, transform .4s var(--ease);
}
.tl-item .dot::after { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--line); transition: background .4s; }
.tl-item.is-visible .dot { border-color: var(--accent); transform: scale(1.08); }
.tl-item.is-visible .dot::after { background: var(--accent); }
.tl-item.accent.is-visible .dot { background: var(--accent); box-shadow: 0 0 0 5px var(--accent-soft); }
.tl-item.accent.is-visible .dot::after { background: var(--paper); }
.tl-item.warn.is-visible .dot { box-shadow: 0 0 0 5px var(--accent-soft); }

.tl-year {
  font-family: var(--serif); font-weight: 900; font-size: 1.5rem; color: var(--accent);
  line-height: 1; margin-bottom: .2rem;
}
.tl-head { font-size: 1.18rem; font-weight: 700; margin-bottom: .15rem; }
.tl-body { color: var(--ink-soft); max-width: 60ch; font-size: 1rem; }

/* ---------- การ์ดผลงาน (cards / นโยบาย) ---------- */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.2rem; margin-top: 1rem; }
.bigcard {
  position: relative; background: var(--card); border: 1px solid var(--line);
  border-radius: 20px; padding: 1.6rem 1.5rem 1.7rem; box-shadow: var(--shadow);
  overflow: hidden; display: flex; flex-direction: column;
  transition: transform .3s var(--ease), box-shadow .3s;
}
.bigcard::after {
  content: ""; position: absolute; left: 0; top: 0; height: 4px; width: 100%;
  background: linear-gradient(90deg, var(--accent), transparent);
}
.bigcard:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
.bigcard .bico {
  width: 54px; height: 54px; border-radius: 14px; display: grid; place-items: center;
  background: var(--accent-soft); color: var(--accent); margin-bottom: 1rem;
}
.bigcard .bico svg { width: 28px; height: 28px; }
.bigcard .tag { font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }
.bigcard .bhead { font-family: var(--serif); font-size: 1.3rem; font-weight: 700; margin: .25rem 0 .5rem; line-height: 1.2; }
.bigcard .bbody { color: var(--ink-soft); font-size: .96rem; flex: 1; }
.bigcard .stat {
  margin-top: 1.1rem; padding-top: 1rem; border-top: 1px dashed var(--line);
}
.bigcard .stat .num {
  font-family: var(--serif); font-weight: 900; font-size: 2.3rem; color: var(--accent); line-height: 1;
}
.bigcard .stat .slabel { font-size: .82rem; color: var(--ink-faint); margin-top: .2rem; }

/* ---------- split (สิ่งที่แตกต่าง/แบบอย่าง) ---------- */
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-top: 1rem; }
.split-card {
  background: var(--card); border: 1px solid var(--line); border-radius: 18px;
  padding: 1.7rem 1.6rem; box-shadow: var(--shadow);
  display: flex; gap: 1.1rem; align-items: flex-start;
}
.split-card .sico {
  flex: 0 0 auto; width: 52px; height: 52px; border-radius: 14px; display: grid; place-items: center;
  background: var(--accent); color: #fff;
}
.split-card .sico svg { width: 26px; height: 26px; }
.split-card .shead { font-family: var(--serif); font-size: 1.25rem; font-weight: 700; margin-bottom: .35rem; line-height: 1.2; }
.split-card .sbody { color: var(--ink-soft); font-size: 1rem; }
@media (max-width: 760px) { .split { grid-template-columns: 1fr; } }

/* ---------- summary + quiz ---------- */
.takeaways { display: flex; flex-direction: column; gap: .8rem; margin: .5rem 0 2rem; }
.takeaway {
  display: flex; gap: .9rem; align-items: flex-start;
  background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--accent);
  border-radius: 0 12px 12px 0; padding: 1rem 1.2rem; box-shadow: var(--shadow); font-size: 1.05rem;
}
.takeaway .n {
  flex: 0 0 auto; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff;
  display: grid; place-items: center; font-weight: 800; font-size: .9rem; font-family: var(--serif);
}

.quiz-wrap { margin-top: 1rem; }
.quiz-title { font-family: var(--serif); font-weight: 700; font-size: 1.4rem; margin-bottom: 1rem; display: flex; align-items: center; gap: .6rem; }
.qcard { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 1.3rem 1.4rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.qcard .q { font-weight: 700; font-size: 1.08rem; margin-bottom: .9rem; }
.qcard .choices { display: grid; gap: .55rem; }
.choice {
  text-align: left; font-family: var(--sans); font-size: .98rem; color: var(--ink);
  background: var(--paper); border: 1.5px solid var(--line); border-radius: 11px;
  padding: .75rem 1rem; min-height: 48px; cursor: pointer;
  display: flex; align-items: center; gap: .7rem;
  transition: border-color .18s, background .18s, transform .12s;
}
.choice:hover:not(.locked) { border-color: var(--accent); transform: translateX(3px); }
.choice .mk {
  flex: 0 0 auto; width: 26px; height: 26px; border-radius: 7px; border: 1.5px solid var(--line);
  display: grid; place-items: center; font-weight: 700; font-size: .85rem; color: var(--ink-soft);
}
.choice.correct { border-color: var(--green); background: rgba(28,122,69,.10); }
.choice.correct .mk { background: var(--green); border-color: var(--green); color: #fff; }
.choice.wrong { border-color: var(--clay); background: rgba(178,58,37,.08); }
.choice.wrong .mk { background: var(--clay); border-color: var(--clay); color: #fff; }
.qcard .why {
  margin-top: .9rem; font-size: .92rem; color: var(--ink-soft);
  background: var(--accent-soft); border-radius: 10px; padding: .7rem .9rem;
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .4s var(--ease), opacity .3s, padding .3s, margin .3s;
  padding-top: 0; padding-bottom: 0; margin-top: 0;
}
.qcard.answered .why { max-height: 200px; opacity: 1; padding: .7rem .9rem; margin-top: .9rem; }
.qcard .why b { color: var(--accent); }

.footnote { margin-top: 2.5rem; font-size: .8rem; color: var(--ink-faint); border-top: 1px solid var(--line); padding-top: 1rem; max-width: 70ch; }

/* ---------- #1 citations ใต้สถิติ ---------- */
.cite { font-size: .7rem; color: var(--ink-faint); margin-top: .55rem; line-height: 1.4; }

/* ---------- #2 stats-grid (by the numbers) ---------- */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 1rem; margin-top: 1rem; }
.stat-big {
  background: var(--card); border: 1px solid var(--line); border-top: 4px solid var(--accent);
  border-radius: 16px; padding: 1.5rem 1.4rem; box-shadow: var(--shadow);
}
.stat-big .num { font-family: var(--serif); font-weight: 900; font-size: clamp(2.2rem, 5vw, 2.9rem); color: var(--accent); line-height: 1; }
.stat-big .slabel { font-size: .98rem; color: var(--ink-soft); margin-top: .45rem; }

/* ---------- #7 balance scale + #3 discuss ---------- */
.balance-wrap { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1.2rem; align-items: center; margin-top: 1rem; }
.balance-col { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 1.3rem 1.4rem; box-shadow: var(--shadow); }
.balance-col.pos { border-top: 4px solid var(--green); }
.balance-col.neg { border-top: 4px solid var(--clay); }
.bcol-label { font-family: var(--serif); font-weight: 700; font-size: 1.15rem; margin-bottom: .7rem; }
.balance-col.pos .bcol-label { color: var(--green); }
.balance-col.neg .bcol-label { color: var(--clay); }
.balance-col ul { list-style: none; display: flex; flex-direction: column; gap: .5rem; }
.balance-col li { position: relative; padding-left: 1.25rem; color: var(--ink-soft); font-size: 1rem; }
.balance-col li::before { content: ""; position: absolute; left: 0; top: .5em; width: 7px; height: 7px; border-radius: 50%; }
.balance-col.pos li::before { background: var(--green); }
.balance-col.neg li::before { background: var(--clay); }
.balance-scale { width: 150px; color: var(--ink-soft); }
.balance-scale svg { width: 100%; height: auto; display: block; }
@media (max-width: 780px) {
  .balance-wrap { grid-template-columns: 1fr; }
  .balance-scale { width: 130px; margin: 0 auto; order: -1; }
}
.discuss { margin-top: 1.6rem; background: var(--accent-soft); border: 1.5px dashed var(--accent); border-radius: 14px; padding: 1.2rem 1.4rem; }
.discuss-q { font-family: var(--serif); font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: .6rem; }
.discuss-q svg { width: 22px; height: 22px; color: var(--accent); flex: 0 0 auto; }
.discuss-prompts { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: .85rem; }
.discuss-prompts span { font-size: .9rem; color: var(--ink-soft); background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: .4rem .9rem; }

/* ---------- #5 presenter timer ---------- */
.timer {
  font-variant-numeric: tabular-nums; font-weight: 700; font-size: .9rem; color: var(--ink-soft);
  background: var(--card); border: 1px solid var(--line); border-radius: 999px;
  padding: .55rem .85rem; min-width: 64px; cursor: pointer; box-shadow: var(--shadow);
  transition: background .2s, color .2s, border-color .2s;
}
.timer::before { content: "⏱ "; opacity: .6; }
.timer:hover { border-color: var(--accent); color: var(--accent); }
.timer.flash { background: var(--accent); color: #fff; border-color: var(--accent); }
@media (max-width: 600px) { .timer { display: none; } }

/* ---------- #6 help overlay ---------- */
.help-overlay {
  position: fixed; inset: 0; z-index: 90; display: none; place-items: center; padding: 1.5rem;
  background: rgba(10,12,18,.5); backdrop-filter: blur(3px);
}
.help-overlay.open { display: grid; }
.help-card {
  position: relative; background: var(--card); border: 1px solid var(--line);
  border-radius: 18px; padding: 1.8rem; max-width: 460px; width: 100%; box-shadow: var(--shadow-lg);
  animation: pop .25s var(--ease-out);
}
@keyframes pop { from { transform: translateY(12px) scale(.97); opacity: 0; } to { transform: none; opacity: 1; } }
.help-card h3 { font-family: var(--serif); font-size: 1.4rem; margin-bottom: 1.1rem; }
.help-list { list-style: none; display: flex; flex-direction: column; gap: .55rem; }
.help-list li { display: flex; align-items: center; gap: .9rem; }
.help-list kbd {
  font-family: var(--sans); font-weight: 700; font-size: .76rem; min-width: 70px; text-align: center;
  background: var(--paper); border: 1px solid var(--line); border-bottom-width: 2px; border-radius: 7px;
  padding: .3rem .5rem; color: var(--ink);
}
.help-list span { color: var(--ink-soft); }
.help-foot { margin-top: 1.2rem; font-size: .8rem; color: var(--ink-faint); }
.help-close {
  position: absolute; top: 1rem; right: 1rem; width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--line); background: var(--paper); color: var(--ink); cursor: pointer; display: grid; place-items: center;
}
.help-close:hover { border-color: var(--accent); color: var(--accent); }
.help-close svg { width: 16px; height: 16px; }

/* ============================================================================
   #9 ธีมมืด (Dark theme)
   ============================================================================ */
html[data-theme="dark"] {
  --paper: #13151b; --paper-2: #191c24; --ink: #ece7da; --ink-soft: #aeb4c0; --ink-faint: #7e838f;
  --line: #2a2f3a; --card: #1b1f29;
  --saffron: #f0973f; --saffron-br: #ffac57; --green: #3bbd73; --clay: #e06a4f; --navy: #7aa7ff;
  --shadow: 0 1px 2px rgba(0,0,0,.35), 0 16px 40px -18px rgba(0,0,0,.65);
  --shadow-lg: 0 30px 80px -30px rgba(0,0,0,.75);
}
html[data-theme="dark"] [data-cat="neutral"]  { --accent: #7aa7ff; --accent-soft: rgba(122,167,255,.16); }
html[data-theme="dark"] [data-cat="positive"] { --accent: #3bbd73; --accent-soft: rgba(59,189,115,.18); }
html[data-theme="dark"] [data-cat="warning"]  { --accent: #e06a4f; --accent-soft: rgba(224,106,79,.16); }
html[data-theme="dark"] [data-cat="insight"]  { --accent: #f0973f; --accent-soft: rgba(240,151,63,.18); }
html[data-theme="dark"] body {
  background-image:
    radial-gradient(1200px 600px at 80% -10%, rgba(240,151,63,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(59,189,115,.08), transparent 55%);
}
html[data-theme="dark"] body::before { mix-blend-mode: screen; opacity: .4; }
html[data-theme="dark"] .portrait.has-photo { background: linear-gradient(165deg, #222734, #14171f); }
html[data-theme="dark"] .btn[aria-pressed="true"] { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ---------- decorative chakra background ใน hero/summary ---------- */
.slide .ghost-chakra {
  position: absolute; right: -8%; top: 50%; transform: translateY(-50%);
  width: min(48vw, 520px); aspect-ratio: 1; opacity: .05; pointer-events: none; z-index: -1;
  color: var(--accent);
}

/* ============================================================================
   โหมด SLIDE (เต็มจอ)
   ============================================================================ */
body.mode-slide { overflow: hidden; height: 100vh; }
body.mode-slide .deck { height: 100vh; }
body.mode-slide .slide {
  position: fixed; inset: 0; max-width: none; width: 100vw; height: 100vh;
  margin: 0; padding: clamp(3.5rem, 8vh, 6rem) clamp(1.5rem, 8vw, 7rem);
  border: none !important;
  opacity: 0; visibility: hidden; pointer-events: none;
  transform: translateX(40px) scale(.99);
  transition: opacity .5s var(--ease), transform .6s var(--ease-out), visibility .5s;
  overflow-y: auto;
}
body.mode-slide .slide > * { max-width: var(--maxw); width: 100%; margin-left: auto; margin-right: auto; }
body.mode-slide .slide.is-active {
  opacity: 1; visibility: visible; pointer-events: auto; transform: none; z-index: 5;
}
body.mode-slide .slide.leaving-left { transform: translateX(-40px) scale(.99); opacity: 0; }

/* ---------- ตัวควบคุมสไลด์ ล่างจอ ---------- */
.slide-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 55;
  display: none; align-items: center; justify-content: center; gap: 1rem;
  padding: 1rem; pointer-events: none;
}
body.mode-slide .slide-nav { display: flex; }
.slide-nav > * { pointer-events: auto; }
.nav-btn {
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--line); color: var(--ink);
  display: grid; place-items: center; cursor: pointer; box-shadow: var(--shadow);
  transition: transform .18s var(--ease), background .18s, color .18s, border-color .18s;
}
.nav-btn:hover { transform: scale(1.08); border-color: var(--accent); color: var(--accent); }
.nav-btn:active { transform: scale(.95); }
.nav-btn:disabled { opacity: .35; cursor: default; transform: none; }
.nav-btn svg { width: 22px; height: 22px; }

.dots { display: flex; align-items: center; gap: .5rem; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: .55rem .9rem; box-shadow: var(--shadow); }
.dot-i {
  width: 9px; height: 9px; border-radius: 50%; background: var(--line); border: none; cursor: pointer; padding: 0;
  transition: transform .25s var(--ease), background .25s, width .25s;
}
.dot-i:hover { background: var(--ink-soft); }
.dot-i.active { background: var(--accent); width: 26px; border-radius: 6px; }
.counter { font-variant-numeric: tabular-nums; font-weight: 700; font-size: .9rem; color: var(--ink-soft); min-width: 56px; text-align: center; }
.counter b { color: var(--ink); font-family: var(--serif); }

@media (max-width: 600px) {
  .dots { display: none; }
  .nav-btn { width: 60px; height: 60px; } /* นิ้วแตะง่ายบนมือถือ/ทัชสกรีน */
}

/* ---------- Speaker Notes panel ---------- */
.notes-panel {
  position: fixed; z-index: 80; right: 0; top: 0; bottom: 0; width: min(420px, 88vw);
  background: #15151c; color: #e9e4d6;
  box-shadow: -20px 0 60px -20px rgba(0,0,0,.5);
  transform: translateX(100%); transition: transform .45s var(--ease-out);
  display: flex; flex-direction: column; padding: 1.5rem 1.5rem 2rem;
}
.notes-panel.open { transform: translateX(0); }
.notes-panel h3 { font-family: var(--serif); font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: .5rem; }
.notes-panel .np-kicker { font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: var(--saffron-br); font-weight: 700; }
.notes-panel .np-slide-title { font-size: 1.45rem; font-family: var(--serif); font-weight: 700; color: #fff; margin: .2rem 0 1rem; }
.notes-panel .np-body { font-size: 1.05rem; line-height: 1.7; color: #d8d2c4; flex: 1; overflow-y: auto; }
.notes-panel .np-foot { font-size: .78rem; color: #8e887a; border-top: 1px solid #2c2c36; padding-top: .8rem; margin-top: 1rem; }
.notes-panel .np-close {
  position: absolute; top: 1rem; right: 1rem; width: 38px; height: 38px; border-radius: 50%;
  background: #25252f; border: none; color: #e9e4d6; cursor: pointer; display: grid; place-items: center;
}
.notes-panel .np-close:hover { background: #32323e; }
.notes-backdrop {
  position: fixed; inset: 0; z-index: 79; background: rgba(0,0,0,.25);
  opacity: 0; visibility: hidden; transition: opacity .3s, visibility .3s;
}
.notes-backdrop.open { opacity: 1; visibility: visible; }

/* ============================================================================
   อนิเมชัน REVEAL + SPLIT WORD
   ============================================================================ */
[data-reveal] {
  opacity: 0; transform: translateY(26px);
  transition: opacity .7s var(--ease-out), transform .7s var(--ease-out);
  transition-delay: var(--d, 0ms);
}
[data-reveal].is-visible { opacity: 1; transform: none; }

.split-title { display: inline-block; }
.split-title .word {
  display: inline-block; opacity: 0; transform: translateY(.5em) rotate(2deg);
  transition: opacity .6s var(--ease-out), transform .6s var(--ease-out);
  transition-delay: var(--wd, 0ms);
}
.split-title.is-visible .word { opacity: 1; transform: none; }
.split-title .sp { display: inline-block; width: .26em; }

/* ปิดอนิเมชัน (Motion Off / prefers-reduced-motion) */
body.motion-off [data-reveal],
body.motion-off .split-title .word { opacity: 1 !important; transform: none !important; transition: none !important; }
body.motion-off .tl-item .dot { transition: none !important; }
body.motion-off .rail-fill { transition: none !important; }
body.motion-off * { scroll-behavior: auto !important; }
body.motion-off .slide { transition: opacity .15s linear !important; }

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  [data-reveal], .split-title .word { transition-duration: .01ms !important; }
}

/* ---------- ภาพรวมเล็ก/มือถือ ---------- */
@media (max-width: 520px) {
  .slide { min-height: auto; padding-top: 5rem; padding-bottom: 3rem; }
  .hero { min-height: 100vh; }
  .bigcard .stat .num { font-size: 2rem; }
}

/* ============================================================================
   ★ ส่วนเสริม 19 ฟีเจอร์ใหม่
   ============================================================================ */

/* ---------- ป้ายผู้นำเสนอประจำสไลด์ (one presenter per slide) ---------- */
.byline {
  display: inline-flex; align-items: center; gap: .4rem;
  font-size: .78rem; font-weight: 600; letter-spacing: .01em;
  color: var(--accent); background: var(--accent-soft);
  border: 1px solid var(--accent); border-radius: 999px;
  padding: .3rem .8rem; margin-bottom: 1rem;
}
.byline svg { width: 15px; height: 15px; }
.byline b { font-weight: 800; letter-spacing: .03em; }
.byline .by-lbl { opacity: .85; font-weight: 600; }
.hero .byline { margin-bottom: 1.1rem; }
@media (max-width: 520px) { .byline .by-lbl { display: none; } }
.pv-by { font-size: 1rem; font-weight: 700; color: var(--green-br); margin-bottom: .7rem; }
.pv-by b { color: #fff; font-size: 1.15rem; }

/* ---------- #17 เลนส์ภาวะผู้นำ (badge ข้าง kicker) ---------- */
.lens-badge {
  display: inline-flex; align-items: center; gap: .3rem;
  font-size: .66rem; font-weight: 700; letter-spacing: .02em; text-transform: none;
  color: var(--ink-soft); background: var(--paper-2); border: 1px solid var(--line);
  border-radius: 999px; padding: .18rem .55rem .18rem .4rem; margin-left: .2rem;
}
.lens-badge svg { width: 13px; height: 13px; opacity: .8; }

/* ---------- #8 / #10 source-mark + term + tooltip ---------- */
.src-mark {
  display: inline-grid; place-items: center; width: 15px; height: 15px; margin-left: .25rem;
  font-size: .62rem; font-weight: 800; font-style: normal; line-height: 1; vertical-align: super;
  color: var(--accent); background: var(--accent-soft); border-radius: 50%; cursor: pointer;
  user-select: none; transition: transform .15s;
}
.src-mark:hover { transform: scale(1.15); }
.src-mark:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.term {
  cursor: help; border-bottom: 1.5px dotted var(--accent); color: inherit; font-weight: 600;
}
.term:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }
.tip {
  position: fixed; z-index: 100; max-width: 280px; pointer-events: none;
  background: #15151c; color: #ece7da; font-size: .82rem; line-height: 1.5; font-weight: 500;
  padding: .6rem .8rem; border-radius: 10px; box-shadow: var(--shadow-lg);
  opacity: 0; transform: translateY(4px); transition: opacity .16s, transform .16s;
}
.tip.on { opacity: 1; transform: none; }

/* ---------- #9 counter-argument บนการ์ดผลงาน ---------- */
.counter-note {
  margin-top: .9rem; padding-top: .8rem; border-top: 1px dashed var(--line);
  display: flex; gap: .5rem; align-items: flex-start;
  font-size: .82rem; color: var(--clay); line-height: 1.45;
}
.counter-note svg { width: 16px; height: 16px; flex: 0 0 auto; margin-top: .1rem; color: var(--clay); }
html[data-theme="dark"] .counter-note { color: var(--clay); }

/* ---------- #6 mini chart ---------- */
.mini-chart { margin-top: 1rem; padding-top: .9rem; border-top: 1px dashed var(--line); }
.mc-head { font-size: .76rem; font-weight: 700; color: var(--ink-soft); margin-bottom: .4rem; }
.mc-unit { font-weight: 400; color: var(--ink-faint); }
.mc-svg { width: 100%; height: 96px; display: block; overflow: visible; }
.mc-area { fill: var(--accent-soft); opacity: 0; transition: opacity .8s ease .3s; }
.mc-line {
  fill: none; stroke: var(--accent); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: var(--len); stroke-dashoffset: var(--len);
}
.mc-dot { fill: var(--accent); opacity: 0; }
.mc-x { fill: var(--ink-faint); font-size: 9px; font-family: var(--sans); }
.bigcard.is-visible .mc-area { opacity: 1; }
.bigcard.is-visible .mc-line { animation: mcDraw 1.3s var(--ease) .35s forwards; }
.bigcard.is-visible .mc-dot { animation: mcDot .3s var(--ease-out) forwards; animation-delay: var(--di); }
@keyframes mcDraw { to { stroke-dashoffset: 0; } }
@keyframes mcDot { to { opacity: 1; } }

/* ---------- #5 + #7 scale viz (แผนที่ + คน) ---------- */
.scaleviz {
  display: grid; grid-template-columns: minmax(150px, .8fr) 1.2fr; gap: 1.4rem; margin-top: 1.6rem;
  background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 1.4rem 1.5rem; box-shadow: var(--shadow);
}
.sv-cap { font-size: .82rem; font-weight: 700; color: var(--ink-soft); margin-bottom: .6rem; }
.sv-map { display: flex; flex-direction: column; align-items: center; }
.india-svg { width: 100%; max-width: 170px; height: auto; }
.in-nation { fill: var(--accent-soft); stroke: var(--accent); stroke-width: 1.5; opacity: 0; transition: opacity .8s ease; }
.in-guj { fill: var(--saffron); opacity: 0; transition: opacity .6s ease; }
.in-ping { fill: var(--saffron); opacity: 0; }
.scaleviz.is-visible .in-nation { opacity: 1; transition-delay: .45s; }
.scaleviz.is-visible .in-guj { opacity: 1; }
.scaleviz.is-visible .in-ping { animation: ping 1.6s ease-out .3s 2; }
@keyframes ping { 0% { opacity: .9; transform: scale(.6); transform-origin: 49px 74px; } 70% { opacity: 0; transform: scale(2.6); transform-origin: 49px 74px; } 100% { opacity: 0; } }
.sv-map-legend { font-size: .68rem; color: var(--ink-faint); margin-top: .5rem; display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; justify-content: center; }
.sv-map-legend .lg { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
.sv-map-legend .lg.guj { background: var(--saffron); }
.sv-map-legend .lg.nat { background: var(--accent); }
.ppl-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.ppl {
  width: 16px; height: 22px; flex: 0 0 auto; opacity: 0; transform: translateY(6px);
  background: var(--accent);
  -webkit-mask: radial-gradient(circle at 50% 26%, #000 22%, transparent 23%) top/100% 45% no-repeat, radial-gradient(ellipse 60% 55% at 50% 100%, #000 60%, transparent 61%) bottom/100% 60% no-repeat;
  mask: radial-gradient(circle at 50% 26%, #000 22%, transparent 23%) top/100% 45% no-repeat, radial-gradient(ellipse 60% 55% at 50% 100%, #000 60%, transparent 61%) bottom/100% 60% no-repeat;
}
.ppl:first-child { background: var(--saffron); }
.scaleviz.is-visible .ppl { animation: pplIn .4s var(--ease-out) forwards; animation-delay: var(--pi); }
@keyframes pplIn { to { opacity: .9; transform: none; } }
.sv-people-note { font-size: .68rem; color: var(--ink-faint); margin-top: .6rem; }
@media (max-width: 680px) { .scaleviz { grid-template-columns: 1fr; } }

/* ---------- #16 agenda ---------- */
.agenda { display: flex; flex-direction: column; gap: .9rem; margin-top: 1rem; }
.agenda-item {
  display: flex; gap: 1.1rem; align-items: flex-start;
  background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 1.2rem 1.4rem; box-shadow: var(--shadow);
  transition: transform .25s var(--ease), border-color .25s;
}
.agenda-item:hover { transform: translateX(4px); border-color: var(--accent); }
.agenda-n { font-family: var(--serif); font-weight: 900; font-size: 2rem; color: var(--accent); line-height: 1; opacity: .85; }
.agenda-head { font-family: var(--serif); font-size: 1.25rem; font-weight: 700; margin-bottom: .2rem; }
.agenda-body { color: var(--ink-soft); font-size: .98rem; }

/* ---------- #11 poll ---------- */
.poll { margin-top: 1rem; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 1.5rem; box-shadow: var(--shadow); max-width: 640px; }
.poll-q { font-family: var(--serif); font-size: 1.35rem; font-weight: 700; margin-bottom: .3rem; }
.poll-hint { font-size: .85rem; color: var(--ink-faint); margin-bottom: 1.1rem; }
.poll-options { display: flex; flex-direction: column; gap: .65rem; }
.poll-opt {
  position: relative; overflow: hidden; text-align: left; font-family: var(--sans);
  font-size: 1rem; font-weight: 600; color: var(--ink); cursor: pointer;
  background: var(--paper); border: 1.5px solid var(--line); border-radius: 12px;
  padding: .85rem 1.1rem; min-height: 50px; display: flex; align-items: center; gap: .6rem;
  transition: border-color .18s, transform .12s;
}
.poll:not(.voted) .poll-opt:hover { border-color: var(--accent); transform: translateX(3px); }
.po-bar {
  position: absolute; left: 0; top: 0; bottom: 0; width: 0; z-index: 0;
  background: var(--accent-soft); transition: width .7s var(--ease-out);
}
.poll-opt[data-cat="positive"] { --accent: var(--green); --accent-soft: rgba(28,122,69,.14); }
.poll-opt[data-cat="warning"] { --accent: var(--clay); --accent-soft: rgba(178,58,37,.13); }
.po-label, .po-pct { position: relative; z-index: 1; }
.po-pct { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 800; color: var(--accent); }
.poll-opt.lead { border-color: var(--accent); }
.poll.voted .poll-opt { cursor: default; }
.poll-foot { margin-top: 1rem; font-size: .82rem; color: var(--ink-faint); }
.poll-reset { background: none; border: none; color: var(--accent); cursor: pointer; font: inherit; text-decoration: underline; padding: 0; }

/* ---------- #14 reflection + #18 closing ---------- */
.reflection { margin-top: 1.6rem; background: var(--accent-soft); border: 1.5px dashed var(--accent); border-radius: 14px; padding: 1.2rem 1.4rem; max-width: 640px; }
.rf-label { display: block; font-family: var(--serif); font-weight: 700; font-size: 1.1rem; margin-bottom: .6rem; }
.rf-input {
  width: 100%; font-family: var(--sans); font-size: 1rem; color: var(--ink); line-height: 1.5;
  background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: .7rem .9rem; resize: vertical;
}
.rf-input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.rf-saved { font-size: .8rem; color: var(--green); margin-top: .5rem; font-weight: 600; }
.closing-title { font-size: clamp(2.2rem, 6vw, 4rem) !important; }
.closing-lead { max-width: 52ch; font-size: clamp(1.1rem, 2.2vw, 1.4rem); }
.closing-echo {
  background: var(--card); border-left: 4px solid var(--accent); border-radius: 0 12px 12px 0;
  padding: 1.1rem 1.3rem; margin: .5rem 0 1.5rem; box-shadow: var(--shadow); max-width: 640px;
}
.closing-echo .ce-q { display: block; font-size: .8rem; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .3rem; }
.closing-echo .ce-a { font-family: var(--serif); font-size: 1.3rem; font-weight: 700; color: var(--accent); }
.closing-cta {
  display: inline-block; font-family: var(--serif); font-weight: 700; font-size: 1.3rem; color: #fff;
  background: var(--accent); border-radius: 999px; padding: .7rem 1.6rem; box-shadow: var(--shadow);
}

/* ---------- #12 drag-the-balance ---------- */
.dragscale { margin-top: 1rem; }
.ds-hint { font-size: .88rem; color: var(--ink-soft); margin-bottom: 1.2rem; }
.ds-stage { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: end; margin-bottom: 1.4rem; }
.ds-pan-zone { display: flex; flex-direction: column; align-items: center; gap: .5rem; }
.ds-pan-label { font-family: var(--serif); font-weight: 700; font-size: 1.05rem; }
.ds-pan {
  width: 100%; min-height: 96px; border-radius: 14px; padding: .6rem;
  background: var(--paper-2); border: 2px dashed var(--line);
  display: flex; flex-wrap: wrap; gap: .4rem; align-content: flex-start; justify-content: center;
  transition: transform .5s var(--ease), border-color .2s, background .2s;
}
.ds-pan.hot { border-color: var(--accent); background: var(--accent-soft); }
.ds-pan-zone.left .ds-pan { border-color: rgba(28,122,69,.4); }
.ds-pan-zone.right .ds-pan { border-color: rgba(178,58,37,.4); }
.ds-beam-wrap { position: relative; width: 90px; height: 96px; display: flex; align-items: flex-end; justify-content: center; }
.ds-stand { position: absolute; bottom: 0; width: 6px; height: 78px; background: var(--ink-soft); border-radius: 3px; opacity: .5; }
.ds-fulcrum { position: absolute; bottom: 0; width: 40px; height: 8px; background: var(--ink-soft); border-radius: 3px; opacity: .5; }
.ds-beam { position: absolute; bottom: 74px; width: 84px; height: 6px; background: var(--ink); border-radius: 3px; transition: transform .6s var(--ease); }
.ds-beam-end { position: absolute; top: -3px; width: 10px; height: 10px; border-radius: 50%; background: var(--ink); }
.ds-beam-end.l { left: -4px; } .ds-beam-end.r { right: -4px; }
.ds-pool { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; min-height: 20px; }
.ds-chip {
  display: inline-flex; align-items: center; gap: .15rem; font-family: var(--sans); font-size: .8rem; font-weight: 600;
  color: var(--ink); background: var(--card); border: 1.5px solid var(--line); border-radius: 999px;
  padding: .3rem .4rem; cursor: grab; touch-action: none; box-shadow: var(--shadow);
  transition: border-color .15s, box-shadow .15s;
}
.ds-chip.pos { border-color: rgba(28,122,69,.5); }
.ds-chip.neg { border-color: rgba(178,58,37,.5); }
.ds-chip:hover { box-shadow: var(--shadow-lg); }
.ds-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.ds-chip.dragging { cursor: grabbing; z-index: 50; position: relative; box-shadow: var(--shadow-lg); }
.ds-chip-t { padding: 0 .15rem; }
.ds-arrow { display: inline-grid; place-items: center; width: 18px; height: 18px; border-radius: 50%; font-size: .7rem; color: var(--ink-soft); background: var(--paper-2); }
.ds-arrow:hover { color: #fff; background: var(--accent); }
.ds-pan .ds-chip { box-shadow: none; }
.ds-readout {
  text-align: center; font-family: var(--serif); font-weight: 700; font-size: 1.1rem; color: var(--ink-soft);
  background: var(--paper-2); border-radius: 12px; padding: .8rem 1rem;
}
.ds-readout.pos { color: var(--green); background: rgba(28,122,69,.10); }
.ds-readout.neg { color: var(--clay); background: rgba(178,58,37,.10); }
.ds-readout.even.done { color: var(--accent); background: var(--accent-soft); }
@media (max-width: 600px) { .ds-stage { grid-template-columns: 1fr; } .ds-beam-wrap { margin: 0 auto; order: -1; } }

/* ---------- #13 quiz score + result card ---------- */
.quiz-score {
  display: flex; align-items: center; gap: 1.4rem; margin-top: .5rem;
  background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 1.4rem 1.5rem; box-shadow: var(--shadow);
  animation: pop .4s var(--ease-out);
}
.qs-ring { position: relative; width: 80px; height: 80px; flex: 0 0 auto; }
.qs-ring svg { width: 80px; height: 80px; transform: rotate(-90deg); }
.qs-bg { fill: none; stroke: var(--line); stroke-width: 7; }
.qs-fg { fill: none; stroke: var(--accent); stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 1s var(--ease); }
.qs-num { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--serif); font-weight: 900; font-size: 1.25rem; color: var(--accent); }
.qs-text { flex: 1; }
.qs-msg { font-size: 1.1rem; font-weight: 700; margin-bottom: .7rem; }
.qs-dl {
  display: inline-flex; align-items: center; gap: .45rem; font: inherit; font-size: .9rem; font-weight: 600;
  color: var(--accent); background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 999px;
  padding: .5rem 1rem; cursor: pointer; transition: background .18s, color .18s;
}
.qs-dl:hover { background: var(--accent); color: #fff; }
.qs-dl svg { width: 16px; height: 16px; }

/* ---------- #2 loader ---------- */
.loader {
  position: fixed; inset: 0; z-index: 200; display: grid; place-items: center; gap: .4rem;
  grid-auto-flow: row; background: var(--paper); transition: opacity .5s ease, visibility .5s;
}
.loader-chakra { width: 110px; height: 110px; }
.loader.spin .loader-chakra { animation: chakraSpin 1.15s cubic-bezier(.3,.7,.2,1) both; }
@keyframes chakraSpin { 0% { transform: rotate(-220deg) scale(.6); opacity: 0; } 60% { opacity: 1; } 100% { transform: rotate(0) scale(1); opacity: 1; } }
.loader-name { font-family: var(--serif); font-weight: 900; font-size: 1.8rem; color: var(--ink); opacity: 0; animation: fadeUp .5s ease .55s forwards; }
.loader-sub { font-size: .78rem; letter-spacing: .22em; text-transform: uppercase; color: var(--ink-faint); opacity: 0; animation: fadeUp .5s ease .7s forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.loader.done { opacity: 0; visibility: hidden; }

/* ---------- #4 color wash ---------- */
.cat-wash { position: fixed; inset: 0; z-index: 40; pointer-events: none; opacity: 0; }
.cat-wash.flash { animation: catWash 1s var(--ease-out); }
@keyframes catWash { 0% { opacity: 0; } 22% { opacity: .22; } 100% { opacity: 0; } }

/* ---------- #15 sync badge ---------- */
.sync-badge {
  position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%) translateY(20px); z-index: 75;
  font-size: .78rem; font-weight: 700; color: #fff; background: var(--navy);
  padding: .45rem .9rem; border-radius: 999px; box-shadow: var(--shadow-lg);
  opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none;
}
.sync-badge.on { opacity: 1; transform: translateX(-50%) translateY(0); }
body.mode-slide .sync-badge { bottom: 84px; }

/* ---------- #1 hero parallax + Ken Burns ---------- */
.hero { --px: 0px; --py: 0px; }
.hero .ghost-chakra { transform: translateY(-50%) translate3d(var(--px), var(--py), 0); transition: transform .3s var(--ease-out); }
.hero .portrait { transform: translate3d(calc(var(--px) * -.4), calc(var(--py) * -.4), 0); transition: transform .35s var(--ease-out); }
.hero .portrait-img { animation: kenburns 22s ease-in-out infinite alternate; }
@keyframes kenburns { 0% { transform: scale(1.04) translate(0, 0); } 100% { transform: scale(1.13) translate(-1.5%, -2%); } }

/* ---------- dark theme tweaks ---------- */
html[data-theme="dark"] .tip { background: #25252f; }
html[data-theme="dark"] .ds-chip, html[data-theme="dark"] .ds-arrow { background: var(--paper-2); }
html[data-theme="dark"] .loader-chakra { filter: brightness(1.4); }

/* ---------- reduced-motion / motion-off guards ---------- */
body.motion-off .mc-line { animation: none !important; stroke-dashoffset: 0 !important; }
body.motion-off .mc-area, body.motion-off .mc-dot { opacity: 1 !important; animation: none !important; }
body.motion-off .ppl { opacity: .9 !important; transform: none !important; animation: none !important; }
body.motion-off .in-nation, body.motion-off .in-guj { opacity: 1 !important; }
body.motion-off .in-ping { display: none; }
body.motion-off .ds-beam, body.motion-off .ds-pan { transition: none !important; }
body.motion-off .portrait-img { animation: none !important; }
body.motion-off .cat-wash { display: none !important; }
@media (prefers-reduced-motion: reduce) {
  .mc-line { stroke-dashoffset: 0 !important; animation: none !important; }
  .mc-area, .mc-dot, .ppl, .in-nation, .in-guj { opacity: 1 !important; animation: none !important; }
  .in-ping { display: none; }
  .portrait-img { animation: none !important; }
  .loader.spin .loader-chakra { animation: none !important; }
}

/* ============================================================================
   ★★ ชุดที่สอง: ผู้นำเสนอ · อ่านออกเสียง · แหล่งอ้างอิง · สรุปของฉัน
   ============================================================================ */

/* ---------- #8(ใหม่) สไลด์แหล่งอ้างอิง ---------- */
.src-legend { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: 1.1rem; }
.conf-pill {
  font-size: .68rem; font-weight: 800; letter-spacing: .02em; padding: .22rem .6rem; border-radius: 999px;
  border: 1px solid; white-space: nowrap;
}
.conf-pill.verified { color: var(--green); background: rgba(28,122,69,.10); border-color: rgba(28,122,69,.4); }
.conf-pill.approx { color: var(--saffron); background: rgba(217,119,42,.10); border-color: rgba(217,119,42,.4); }
.conf-pill.illus { color: var(--clay); background: rgba(178,58,37,.10); border-color: rgba(178,58,37,.4); }
.src-list { display: flex; flex-direction: column; gap: .6rem; margin-top: .3rem; }
.src-row {
  display: flex; gap: .8rem; align-items: flex-start;
  background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: .85rem 1.1rem; box-shadow: var(--shadow);
}
.src-row .conf-pill { flex: 0 0 auto; margin-top: .15rem; }
.src-row-label { font-weight: 700; font-size: 1rem; }
.src-row-src { font-size: .85rem; color: var(--ink-soft); margin-top: .15rem; line-height: 1.45; }

/* ---------- #10(ใหม่) ปุ่มสรุปของฉัน ---------- */
.takehome-btn {
  display: inline-flex; align-items: center; gap: .5rem; font-family: var(--sans); font-size: 1rem; font-weight: 700;
  color: #fff; background: var(--accent); border: none; border-radius: 999px; padding: .8rem 1.5rem;
  cursor: pointer; box-shadow: var(--shadow); margin: .3rem 0 1.5rem; transition: transform .18s var(--ease), box-shadow .18s;
}
.takehome-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.takehome-btn:active { transform: translateY(0) scale(.98); }
.takehome-btn svg { width: 18px; height: 18px; }

/* ---------- #1(ใหม่) หน้าต่างผู้นำเสนอ ---------- */
body.is-presenter { overflow: auto; height: auto; background: #0f1118; }
body.is-presenter::before { display: none; }
body.is-presenter .toolbar, body.is-presenter .deck, body.is-presenter .slide-nav,
body.is-presenter .progress, body.is-presenter .help-overlay, body.is-presenter .notes-panel,
body.is-presenter .notes-backdrop, body.is-presenter .cat-wash, body.is-presenter .sync-badge,
body.is-presenter .loader, body.is-presenter .tip { display: none !important; }
.pv {
  position: fixed; inset: 0; display: flex; flex-direction: column; gap: 1rem;
  padding: clamp(1rem, 3vw, 2rem); color: #ece7da; font-family: var(--sans);
}
.pv-head { font-size: .9rem; color: #aeb4c0; display: flex; align-items: center; gap: .5rem; }
.pv-head b { color: #fff; font-size: 1.1rem; }
.pv-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green-br); box-shadow: 0 0 0 4px rgba(59,189,115,.25); }
.pv-timer { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 800; font-size: 1.4rem; color: #fff; background: #1b1f29; border: 1px solid #2a2f3a; border-radius: 10px; padding: .25rem .8rem; cursor: pointer; }
.pv-timer::before { content: "⏱ "; opacity: .6; }
.pv-grid { flex: 1; display: grid; grid-template-columns: 1.3fr .9fr; gap: 1.2rem; min-height: 0; }
.pv-current { background: #15151c; border: 1px solid #2a2f3a; border-radius: 18px; padding: 1.8rem; display: flex; flex-direction: column; justify-content: center; overflow: auto; }
.pv-kicker { font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; color: var(--saffron-br); font-weight: 700; margin-bottom: .6rem; }
.pv-title { font-family: var(--serif); font-weight: 900; font-size: clamp(1.8rem, 4vw, 3rem); line-height: 1.05; color: #fff; }
.pv-lead { font-size: 1.15rem; line-height: 1.6; color: #c9cdd6; margin-top: 1rem; }
.pv-side { display: flex; flex-direction: column; gap: 1rem; min-height: 0; }
.pv-next-card { background: #1b1f29; border: 1px solid #2a2f3a; border-left: 4px solid var(--saffron-br); border-radius: 14px; padding: 1.1rem 1.3rem; }
.pv-next-tag { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: #8e939e; font-weight: 700; }
.pv-next-title { font-family: var(--serif); font-weight: 700; font-size: 1.3rem; color: #fff; margin-top: .3rem; }
.pv-notes-box { flex: 1; background: #1b1f29; border: 1px solid #2a2f3a; border-radius: 14px; padding: 1.1rem 1.3rem; overflow: auto; min-height: 0; }
.pv-notes-tag { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: #8e939e; font-weight: 700; margin-bottom: .5rem; }
.pv-notes { font-size: 1.05rem; line-height: 1.7; color: #d8d2c4; }
.pv-controls { display: flex; gap: 1rem; }
.pv-controls button { flex: 1; font-family: var(--sans); font-size: 1.05rem; font-weight: 700; color: #fff; background: var(--navy); border: none; border-radius: 12px; padding: 1rem; cursor: pointer; transition: background .18s, transform .12s; }
.pv-controls button:hover:not(:disabled) { background: #14438f; }
.pv-controls button:active:not(:disabled) { transform: scale(.98); }
.pv-controls button:disabled { opacity: .35; cursor: default; }
@media (max-width: 720px) { .pv-grid { grid-template-columns: 1fr; } }

/* ---------- #6(ใหม่) ปุ่มอ่านออกเสียงตอนทำงาน ---------- */
.btn#btn-tts[aria-pressed="true"] { background: var(--green); color: #fff; border-color: var(--green); }

/* ============================================================================
   ★★★ ชุดที่สาม: เนื้อหาเชิงลึก (INFORMATION)
   ============================================================================ */

/* ---------- #4 ป้าย ข้อเท็จจริง/การตีความ ---------- */
.kind-tag { font-size: .6rem; font-weight: 800; letter-spacing: .02em; padding: .12rem .45rem; border-radius: 5px; vertical-align: middle; white-space: nowrap; }
.kind-tag.fact { color: var(--green); background: rgba(28,122,69,.12); }
.kind-tag.claim { color: var(--saffron); background: rgba(217,119,42,.14); }

/* ---------- #10 ตราประทับ "ข้อมูล ณ" ---------- */
.data-stamp { margin-top: 1rem; font-size: .76rem; color: var(--ink-faint); font-style: italic; }
.data-stamp.inline { margin: 0; font-style: normal; padding: .22rem .6rem; border: 1px dashed var(--line); border-radius: 999px; }

/* ---------- #8 ตัวกรองไทม์ไลน์ + แท็ก + บริบท ---------- */
.tl-filter { display: flex; flex-wrap: wrap; gap: .45rem; margin: 0 0 1.2rem; }
.tlf { font: inherit; font-size: .8rem; font-weight: 600; color: var(--ink-soft); background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: .35rem .85rem; cursor: pointer; transition: all .18s; }
.tlf:hover { border-color: var(--accent); color: var(--accent); }
.tlf.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tl-tag { font-size: .62rem; font-weight: 700; letter-spacing: .02em; color: var(--accent); background: var(--accent-soft); border-radius: 5px; padding: .1rem .45rem; vertical-align: middle; }
.tl-item.tl-hidden { display: none; }
.tl-context { margin-top: .5rem; font-size: .9rem; }
.tl-context summary { cursor: pointer; color: var(--accent); font-weight: 600; font-size: .85rem; list-style: none; display: inline-flex; align-items: center; gap: .3rem; }
.tl-context summary::before { content: "▸"; transition: transform .2s; display: inline-block; }
.tl-context[open] summary::before { transform: rotate(90deg); }
.tl-context summary::-webkit-details-marker { display: none; }
.tl-context > div { margin-top: .5rem; color: var(--ink-soft); background: var(--accent-soft); border-radius: 8px; padding: .6rem .8rem; line-height: 1.55; }

/* ---------- #2 dashboard ก่อน/หลัง ---------- */
.dash { display: flex; flex-direction: column; gap: .7rem; margin-top: .5rem; }
.dash-row { display: grid; grid-template-columns: 1.1fr auto; gap: 1rem; align-items: center; background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--green); border-radius: 12px; padding: 1rem 1.3rem; box-shadow: var(--shadow); }
.dash-label { font-weight: 700; font-size: 1rem; }
.dash-vals { display: flex; align-items: center; gap: .7rem; font-family: var(--serif); }
.dash-from { color: var(--ink-faint); font-weight: 700; font-size: 1.1rem; text-decoration: line-through; text-decoration-color: var(--line); }
.dash-arrow { font-weight: 900; font-size: 1.2rem; }
.dash-arrow.up { color: var(--green); }
.dash-arrow.down { color: var(--clay); }
.dash-to { color: var(--ink); font-weight: 900; font-size: 1.5rem; }
.dash.is-visible .dash-row, .bigcard.is-visible .dash-row { } /* placeholder */
@media (max-width: 560px) { .dash-row { grid-template-columns: 1fr; gap: .4rem; } }

/* ---------- #3 comparison bars ---------- */
.cmp { display: flex; flex-direction: column; gap: .8rem; margin-top: .5rem; }
.cmp-row { display: grid; grid-template-columns: 110px 1fr auto; gap: .8rem; align-items: center; }
.cmp-name { font-weight: 700; font-size: .95rem; text-align: right; }
.cmp-track { height: 26px; background: var(--paper-2); border-radius: 999px; overflow: hidden; }
.cmp-bar { height: 100%; width: 0; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--saffron-br)); transition: width .9s var(--ease-out); transition-delay: var(--bd, 0ms); }
.cmp-row.hot .cmp-name { color: var(--accent); }
.cmp-row.hot .cmp-bar { background: linear-gradient(90deg, var(--green), var(--green-br)); }
.cmp-val { font-family: var(--serif); font-weight: 900; font-size: 1.15rem; color: var(--ink); min-width: 56px; }
.cmp.is-visible .cmp-bar { width: var(--w); }
.cmp-unit { margin-top: 1rem; font-size: .8rem; color: var(--ink-faint); }
@media (max-width: 520px) { .cmp-row { grid-template-columns: 80px 1fr auto; } .cmp-name { font-size: .82rem; } }

/* ---------- #9 reception (สองคอลัมน์) ---------- */
.recv { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-top: .5rem; }
.recv-col { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 1.4rem 1.5rem; box-shadow: var(--shadow); }
.recv-col.praise { border-top: 4px solid var(--green); }
.recv-col.concern { border-top: 4px solid var(--clay); }
.recv-h { font-family: var(--serif); font-weight: 700; font-size: 1.2rem; margin-bottom: .8rem; }
.recv-col.praise .recv-h { color: var(--green); }
.recv-col.concern .recv-h { color: var(--clay); }
.recv-col ul { list-style: none; display: flex; flex-direction: column; gap: .6rem; }
.recv-col li { position: relative; padding-left: 1.3rem; color: var(--ink-soft); font-size: .98rem; line-height: 1.5; }
.recv-col li::before { content: ""; position: absolute; left: 0; top: .55em; width: 7px; height: 7px; border-radius: 50%; }
.recv-col.praise li::before { background: var(--green); }
.recv-col.concern li::before { background: var(--clay); }
@media (max-width: 720px) { .recv { grid-template-columns: 1fr; } }

/* ---------- #6 voices ---------- */
.voices { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.1rem; margin-top: .5rem; }
.voice { position: relative; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 1.5rem 1.5rem 1.3rem; box-shadow: var(--shadow); overflow: hidden; }
.voice::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
.voice.pos::before { background: var(--green); }
.voice.neg::before { background: var(--clay); }
.voice.neutral::before { background: var(--navy); }
.voice-q { font-family: var(--serif); font-size: 3rem; line-height: .6; color: var(--accent); opacity: .25; height: 1.4rem; }
.voice-body { font-size: 1.05rem; line-height: 1.6; color: var(--ink); font-style: normal; margin: .3rem 0 1rem; }
.voice-who { font-weight: 800; font-size: .9rem; color: var(--accent); }
.voice.pos { --accent: var(--green); } .voice.neg { --accent: var(--clay); } .voice.neutral { --accent: var(--navy); }

/* ---------- #7 leadership model ---------- */
.model { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-top: .5rem; }
.model-col { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 1.4rem 1.5rem; box-shadow: var(--shadow); }
.model-col.pos { border-top: 4px solid var(--green); }
.model-col.neg { border-top: 4px solid var(--clay); }
.model-h { font-family: var(--serif); font-weight: 800; font-size: 1.2rem; line-height: 1.2; margin-bottom: .9rem; }
.model-col.pos .model-h { color: var(--green); }
.model-col.neg .model-h { color: var(--clay); }
.model-sub { display: block; font-family: var(--sans); font-size: .72rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); margin-top: .2rem; }
.model-col ul { list-style: none; display: flex; flex-direction: column; gap: .55rem; }
.model-col li { position: relative; padding-left: 1.3rem; color: var(--ink-soft); font-size: .98rem; }
.model-col li::before { content: ""; position: absolute; left: 0; top: .5em; width: 7px; height: 7px; border-radius: 2px; }
.model-col.pos li::before { background: var(--green); }
.model-col.neg li::before { background: var(--clay); }
.model-insight { display: flex; gap: .7rem; align-items: center; margin-top: 1.3rem; background: var(--accent-soft); border: 1.5px dashed var(--accent); border-radius: 14px; padding: 1.1rem 1.4rem; font-size: 1.05rem; font-weight: 600; }
.model-insight svg { width: 26px; height: 26px; color: var(--accent); flex: 0 0 auto; }
@media (max-width: 720px) { .model { grid-template-columns: 1fr; } }

/* ============================================================================
   ★★★ ชุดที่สี่: MOTION GRAPHIC DESIGN
   ============================================================================ */

/* ---------- #15 ตัวคั่นบท (chapter divider) ---------- */
.slide:has(.divider-stage) { justify-content: center; }
.divider-stage {
  position: relative; overflow: hidden; border-radius: 26px;
  padding: clamp(2rem, 6vw, 4.5rem); min-height: min(58vh, 440px);
  display: flex; align-items: center;
  background: linear-gradient(135deg, var(--accent-soft), transparent 70%), var(--card);
  border: 1px solid var(--line); box-shadow: var(--shadow-lg);
}
.divider-num {
  position: absolute; right: .1em; bottom: -.22em; font-family: var(--serif); font-weight: 900;
  font-size: clamp(9rem, 32vw, 22rem); line-height: 1; color: var(--accent); opacity: .08; pointer-events: none;
}
.divider-sweep { position: absolute; inset: 0; background: linear-gradient(115deg, transparent 30%, var(--accent-soft) 50%, transparent 70%); transform: translateX(-120%); }
.divider-stage.is-visible .divider-sweep { animation: dividerSweep 1.4s var(--ease-out) .1s; }
@keyframes dividerSweep { to { transform: translateX(120%); } }
.divider-chakra { position: absolute; right: -4%; top: 50%; width: min(40vw, 360px); aspect-ratio: 1; transform: translateY(-50%) rotate(-90deg) scale(.7); opacity: 0; color: var(--accent); pointer-events: none; }
.divider-stage.is-visible .divider-chakra { animation: dividerChakra 1.3s var(--ease-out) .15s forwards; }
@keyframes dividerChakra { to { opacity: .12; transform: translateY(-50%) rotate(0) scale(1); } }
.divider-main { position: relative; z-index: 2; }
.divider-title { font-size: clamp(2.4rem, 7vw, 5rem) !important; margin: .2rem 0 1rem; }
.divider-lead { max-width: 40ch; font-size: clamp(1.05rem, 2.2vw, 1.4rem); }
.divider-by {
  display: inline-flex; align-items: center; gap: .5rem; margin-top: .4rem;
  font-size: 1rem; color: var(--accent); background: var(--accent-soft);
  border: 1px solid var(--accent); border-radius: 999px; padding: .45rem 1rem;
}
.divider-by svg { width: 17px; height: 17px; }
.divider-by b { font-weight: 800; font-size: 1.15rem; letter-spacing: .03em; }

/* ---------- #19 hero living background (gradient mesh + chakra particles / blob morph #16) ---------- */
.hero-aura { position: absolute; inset: 0; z-index: -2; overflow: hidden; pointer-events: none; }
.hero-aura span {
  position: absolute; border-radius: 42% 58% 60% 40% / 50% 45% 55% 50%;
  filter: blur(36px); opacity: .5; mix-blend-mode: multiply;
}
.hero-aura span:nth-child(1) { width: 46vw; height: 46vw; left: 52%; top: -8%; background: radial-gradient(circle, rgba(217,119,42,.5), transparent 70%); animation: blob 18s ease-in-out infinite, drift1 24s ease-in-out infinite; }
.hero-aura span:nth-child(2) { width: 38vw; height: 38vw; left: 60%; top: 30%; background: radial-gradient(circle, rgba(28,122,69,.4), transparent 70%); animation: blob 22s ease-in-out infinite reverse, drift2 28s ease-in-out infinite; }
.hero-aura span:nth-child(3) { width: 30vw; height: 30vw; left: 40%; top: 50%; background: radial-gradient(circle, rgba(14,47,99,.3), transparent 70%); animation: blob 26s ease-in-out infinite, drift1 32s ease-in-out infinite reverse; }
@keyframes blob {
  0%,100% { border-radius: 42% 58% 60% 40% / 50% 45% 55% 50%; }
  33% { border-radius: 60% 40% 45% 55% / 40% 60% 40% 60%; }
  66% { border-radius: 40% 60% 55% 45% / 55% 40% 60% 45%; }
}
@keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-4%, 5%); } }
@keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(5%, -4%); } }
html[data-theme="dark"] .hero-aura span { mix-blend-mode: screen; opacity: .35; }

/* ---------- #20 scroll-reactive brand chakra ---------- */
.brand .chakra-mini { transition: transform .2s linear; }

/* ---------- #13 odometer (เลขม้วน) ---------- */
.odo { display: inline-flex; align-items: flex-start; }
.odo-digit { display: inline-block; height: 1em; overflow: hidden; vertical-align: top; }
.odo-reel { display: flex; flex-direction: column; transform: translateY(0); transition: transform 1.1s cubic-bezier(.16,1,.3,1); transition-delay: var(--dl, 0ms); will-change: transform; }
.odo-n { height: 1em; line-height: 1; display: block; text-align: center; }
.odo-fix { display: inline-block; }

/* ---------- #18 kinetic typography ---------- */
.kw { display: inline-block; opacity: 0; transform: translateY(.5em) scale(.92); transition: opacity .5s var(--ease-out), transform .5s var(--ease-out); transition-delay: var(--ki, 0ms); }
[data-reveal].is-visible [data-kinetic] .kw, .voice.is-visible .kw { opacity: 1; transform: none; }

/* ---------- #17 line-draw icons ---------- */
.bico svg path, .sico svg path, .pico svg path { stroke-dasharray: 150; stroke-dashoffset: 150; }
.bigcard.is-visible .bico svg path { animation: drawIcon 1s var(--ease) .2s forwards; }
.split-card.is-visible .sico svg path { animation: drawIcon 1s var(--ease) .2s forwards; }
.pcard.is-visible .pico svg path { animation: drawIcon 1s var(--ease) .2s forwards; }
@keyframes drawIcon { to { stroke-dashoffset: 0; } }

/* ---------- #14 journey route on India map ---------- */
.in-route { fill: none; stroke: var(--saffron); stroke-width: 1.6; stroke-dasharray: 4 3; stroke-dashoffset: 90; opacity: 0; }
.scaleviz.is-visible .in-route { animation: routeDraw 2.2s var(--ease) .5s forwards; }
@keyframes routeDraw { from { stroke-dashoffset: 90; opacity: .9; } to { stroke-dashoffset: 0; opacity: .9; } }
.in-route-dot { fill: var(--saffron); opacity: 0; }
.scaleviz.is-visible .in-route-dot { opacity: 1; }
body.motion-off .in-route-dot { display: none; }
.in-delhi { fill: var(--accent); opacity: 0; }
.scaleviz.is-visible .in-delhi { animation: mcDot .4s ease 2.4s forwards; }

/* ---------- #12 Chandrayaan landing scene ---------- */
.chandra { position: absolute; right: 8px; top: 8px; width: 92px; height: 62px; opacity: .9; pointer-events: none; }
.chandra svg { width: 100%; height: 100%; overflow: visible; }
.ch-moon { fill: var(--accent-soft); stroke: var(--accent); stroke-width: 1; }
.ch-crater { fill: var(--accent); opacity: .25; }
.ch-arc { fill: none; stroke: var(--accent); stroke-width: 1; stroke-dasharray: 2 3; opacity: 0; }
.ch-craft { fill: var(--accent); opacity: 0; }
.ch-flame { fill: var(--saffron-br); }
.ch-dust { fill: var(--accent); }
.bigcard.has-chandra.is-visible .ch-arc { animation: chArc .5s ease .15s forwards; }
.bigcard.has-chandra.is-visible .ch-craft { animation: chShow .2s ease .2s forwards; }
@keyframes chArc { to { opacity: .4; } }
@keyframes chShow { to { opacity: 1; } }

/* ---------- #11 scrollytelling dashboard focus ---------- */
.dash-row { transition: border-color .3s, box-shadow .3s, transform .3s; }
.dash-row.focus { border-left-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateX(4px); }

/* ---------- reduced-motion / motion-off guards (ชุด motion) ---------- */
body.motion-off .hero-aura span,
body.motion-off .divider-sweep, body.motion-off .divider-chakra { animation: none !important; }
body.motion-off .divider-chakra { opacity: .1; transform: translateY(-50%); }
body.motion-off .bico svg path, body.motion-off .sico svg path, body.motion-off .pico svg path { stroke-dashoffset: 0 !important; animation: none !important; }
body.motion-off .in-route { stroke-dashoffset: 0 !important; opacity: .9 !important; animation: none !important; }
body.motion-off .in-delhi, body.motion-off .ch-arc, body.motion-off .ch-craft { opacity: .9 !important; animation: none !important; }
body.motion-off .kw { opacity: 1 !important; transform: none !important; transition: none !important; }
body.motion-off .odo-reel { transition: none !important; }
body.motion-off .chandra .ch-craft { opacity: 0 !important; } /* ซ่อนยานถ้าปิด motion (กันค้างกลางจอ) */
@media (prefers-reduced-motion: reduce) {
  .hero-aura span, .divider-sweep, .divider-chakra { animation: none !important; }
  .bico svg path, .sico svg path, .pico svg path, .in-route { stroke-dashoffset: 0 !important; animation: none !important; }
  .kw { opacity: 1 !important; transform: none !important; }
  .odo-reel { transition: none !important; }
  .chandra, .in-route-dot { display: none; }
}

/* ---------- #10 การพิมพ์ / Export PDF — แฮนด์เอาต์ 1 สไลด์ต่อหน้า ---------- */
@media print {
  @page { margin: 1.4cm; }
  .toolbar, .slide-nav, .notes-panel, .notes-backdrop, .progress, .help-overlay, .ghost-chakra,
  .loader, .cat-wash, .tip, .sync-badge, .pv, .takehome-btn,
  .hero-aura, .chandra, .divider-sweep, .divider-chakra, .in-route-dot { display: none !important; }
  .src-row, .dash-row, .voice, .model-col, .recv-col { break-inside: avoid; }
  /* เผยกราฟ/แผนที่/คน/ไอคอน/เลข ให้เต็มเมื่อพิมพ์ */
  .mc-line, .in-route { stroke-dashoffset: 0 !important; }
  .bico svg path, .sico svg path, .pico svg path { stroke-dashoffset: 0 !important; }
  .mc-area, .mc-dot, .ppl, .in-nation, .in-guj, .in-delhi, .kw { opacity: 1 !important; }
  .kw { transform: none !important; }
  .in-ping { display: none !important; }
  .scaleviz, .poll, .quiz-score, .agenda-item, .dragscale, .reflection, .divider-stage, .cmp, .dash { break-inside: avoid; }
  html, body { background: #fff !important; height: auto !important; overflow: visible !important; }
  body::before { display: none !important; }
  .deck { display: block !important; height: auto !important; }
  .slide {
    position: static !important; inset: auto !important; width: auto !important; height: auto !important;
    opacity: 1 !important; visibility: visible !important; transform: none !important;
    min-height: auto !important; page-break-after: always; break-after: page;
    padding: 0 0 1rem !important; border: none !important;

  .slide:last-child { page-break-after: auto; break-after: auto; }
  [data-reveal], .split-title .word { opacity: 1 !important; transform: none !important; }

  .timeline .rail-fill { top: 6px !important; bottom: 6px !important; height: auto !important; }

  /* ---------- จักรอโศก (Ashoka Chakra) 24 ซี่ ---------- */
  function chakra(stroke) {
    let spokes = '';
    for (let i = 0; i < 24; i++) {
      const a = (i * 15) * Math.PI / 180;
      spokes += `<line x1="50" y1="50" x2="${50 + 42 * Math.cos(a)}" y2="${50 + 42 * Math.sin(a)}" stroke="${stroke}" stroke-width="1.4"/>`;
    }
    let pins = '';
    for (let i = 0; i < 24; i++) {
      const a = (i * 15) * Math.PI / 180;
      pins += `<circle cx="${50 + 38 * Math.cos(a)}" cy="${50 + 38 * Math.sin(a)}" r="2" fill="${stroke}"/>`;
    }
    return `<svg viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="44" fill="none" stroke="${stroke}" stroke-width="3"/>
      <circle cx="50" cy="50" r="6" fill="${stroke}"/>
      ${spokes}${pins}</svg>`;
  }

  /* ---------- helper: ตัดหัวข้อเป็นคำเพื่อ split reveal ---------- */
  function splitWords(text) {

    const parts = text.split(' ');
    return '<span class="split-title" data-split>' + parts.map((w, i) =>
      `<span class="word" style="--wd:${i * 90}ms">${w}</span>`
    ).join('<span class="sp"></span>') + '</span>';
  }

  const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  if (location.hash === '#presenter') { initPresenterView(); return; }

    if (s.type === 'poll') {
      return `${head}
        <h2 data-reveal style="--d:80ms">${esc(s.title)}</h2>
        ${s.lead ? `<p class="lead" data-reveal style="--d:180ms">${esc(s.lead)}</p>` : ''}

  /* #6 มินิกราฟเส้นแสดงการเติบโต (inline SVG, ภาพประกอบ) */
  function chartSVG(ch) {
    const pts = ch.points || [];
    if (!pts.length) return '';
    const W = 260, H = 96, padL = 6, padR = 6, padT = 8, padB = 18;
    const max = Math.max.apply(null, pts.map(p => p.y)) || 1;
    const xAt = i => padL + (i / (pts.length - 1)) * (W - padL - padR);
    const yAt = v => padT + (1 - v / max) * (H - padT - padB);
    const coords = pts.map((p, i) => [xAt(i), yAt(p.y)]);
    const line = coords.map((c, i) => (i ? 'L' : 'M') + c[0].toFixed(1) + ' ' + c[1].toFixed(1)).join(' ');
    const area = line + ` L${xAt(pts.length - 1).toFixed(1)} ${(H - padB)} L${padL} ${(H - padB)} Z`;
    const len = 520; // ความยาวเส้นโดยประมาณสำหรับอนิเมชัน draw
    return `<div class="mini-chart" data-chart>
      <div class="mc-head">${esc(ch.title)} <span class="mc-unit">(${esc(ch.unit)}${ch.illustrative ? ' · ภาพประกอบ' : ''})</span>${srcMark(ch.src)}</div>
      <svg viewBox="0 0 ${W} ${H}" class="mc-svg" preserveAspectRatio="none" aria-hidden="true">
        <path class="mc-area" d="${area}"/>
        <path class="mc-line" d="${line}" style="--len:${len}"/>
        ${coords.map((c, i) => `<circle class="mc-dot" cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="2.6" style="--di:${i * 140 + 600}ms"/>`).join('')}
        ${pts.map((p, i) => `<text class="mc-x" x="${xAt(i).toFixed(1)}" y="${H - 5}" text-anchor="middle">${esc(p.x)}</text>`).join('')}
      </svg>
    </div>`;
  }

  /* #5 + #7 ภาพสเกล: แผนที่อินเดีย (กุจราต→ทั้งชาติ) + บล็อกคนเทียบไทย */
  function scaleVizHTML() {
    const THAI = 70;   // ล้านคนต่อ 1 ไอคอน (ราวประชากรไทย)

    return `<div class="scaleviz" data-reveal style="--d:360ms">
      <div class="sv-map">
        <div class="sv-cap">จากรัฐเดียว สู่ทั้งประเทศ</div>

  }
