<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>นเรนทรา โมดี — กรณีศึกษาผู้นำ</title>
<meta name="description" content="พรีเซนต์เชิงวิชาการ กรณีศึกษาภาวะผู้นำของนเรนทรา โมดี นายกรัฐมนตรีอินเดีย — นำเสนอทั้งด้านบวกและด้านลบอย่างเป็นกลาง">
<style>
/* === ฟอนต์ไทยฝัง base64 (self-contained, ไม่มี fetch ภายนอก) === */
{{FONTS}}
/* === สไตล์ === */
{{STYLES}}
</style>
</head>
<body>

  <!-- progress bar (โหมดเลื่อน) -->
  <div class="progress" id="progress"></div>

  <!-- ปุ่มควบคุมมุมบน -->
  <header class="toolbar">
    <div class="brand">
      <span class="chakra-mini"></span>
      <span>นเรนทรา โมดี<small>กรณีศึกษาผู้นำ · Leadership Case Study</small></span>
    </div>
    <span class="spacer"></span>
    <button class="btn" id="btn-help" type="button" title="คีย์ลัด/ความช่วยเหลือ (?)">
      <span class="ico"></span><span class="kbd">?</span>
    </button>
    <button class="btn" id="btn-print" type="button" title="พิมพ์ / บันทึก PDF">
      <span class="ico"></span><span class="lbl">พิมพ์/PDF</span>
    </button>
    <button class="btn" id="btn-theme" type="button" aria-pressed="false" title="สลับธีมสว่าง/มืด (T)">
      <span class="ico"></span><span class="lbl">ธีม</span><span class="kbd">T</span>
    </button>
    <button class="btn" id="btn-notes" type="button" aria-pressed="false" title="โน้ตผู้พูด (S)">
      <span class="ico"></span><span class="lbl">โน้ตผู้พูด</span><span class="kbd">S</span>
    </button>
    <button class="btn" id="btn-motion" type="button" aria-pressed="false" title="เปิด/ปิดอนิเมชัน (A)">
      <span class="ico"></span><span class="lbl">Motion</span><span class="kbd">A</span>
    </button>
    <button class="btn" id="btn-mode" type="button" aria-pressed="false" title="สลับโหมด เลื่อน/สไลด์ (M)">
      <span class="ico"></span><span class="lbl">โหมด: เลื่อน</span><span class="kbd">M</span>
    </button>
  </header>

  <!-- เด็คสไลด์ (เรนเดอร์โดย app.js) -->
  <main class="deck" id="deck" aria-live="polite"></main>

  <!-- ตัวควบคุมโหมดสไลด์ -->
  <nav class="slide-nav" aria-label="ตัวควบคุมสไลด์">
    <button class="nav-btn" id="nav-prev" type="button" aria-label="สไลด์ก่อนหน้า"></button>
    <div class="dots" id="dots"></div>
    <div class="counter" id="counter"></div>
    <button class="timer" id="timer" type="button" title="เวลาที่ใช้นำเสนอ — คลิกเพื่อรีเซ็ต">00:00</button>
    <button class="nav-btn" id="nav-next" type="button" aria-label="สไลด์ถัดไป"></button>
  </nav>

  <!-- Help / keyboard overlay -->
  <div class="help-overlay" id="help-overlay" role="dialog" aria-modal="true" aria-label="คีย์ลัด">
    <div class="help-card">
      <button class="help-close" id="help-close" type="button" aria-label="ปิด"></button>
      <h3>คีย์ลัด & การควบคุม</h3>
      <ul class="help-list" id="help-list"></ul>
      <div class="help-foot">กด <b>Esc</b> หรือคลิกพื้นที่ว่างเพื่อปิด</div>
    </div>
  </div>

  <!-- Speaker notes -->
  <div class="notes-backdrop" id="notes-backdrop"></div>
  <aside class="notes-panel" id="notes-panel" aria-label="โน้ตสำหรับผู้พูด">
    <button class="np-close" type="button" aria-label="ปิดโน้ต"></button>
    <div class="np-kicker"></div>
    <div class="np-slide-title"></div>
    <h3 style="margin-bottom:.5rem">โน้ตสำหรับผู้พูด</h3>
    <div class="np-body"></div>
    <div class="np-foot">มองเห็นเฉพาะผู้นำเสนอ · กด S เพื่อเปิด/ปิด · ผู้ชมไม่เห็นแผงนี้</div>
  </aside>

<script>
/* === ภาพพอร์เทรต (ฝัง base64 — self-contained) === */
{{PORTRAIT}}
/* === ข้อมูลเนื้อหา === */
{{CONTENT}}
/* === ตรรกะแอป === */
{{APP}}
</script>
</body>
</html>
